name: Build APK

# Builds the release APK on GitHub's runners and uploads it to the
# versioned downloads bucket. The vintract.com download card points at
# .../mobile/vintract-mobile-latest.apk.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write   # for AWS OIDC
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ROLE_ARN: arn:aws:iam::764416828771:role/vintract-motley-hosur-inventory-github-prod
  S3_KEY: s3://vintract-app-downloads-prod-764416828771/mobile/vintract-mobile-latest.apk
  NDK_VERSION: "27.1.12297006"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Persist Gradle deps + build cache across runs. Cold run is slow;
      # every run after reuses downloaded deps and cached task outputs.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      # Avoid re-downloading the ~3GB NDK every run.
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk
          key: ndk-${{ env.NDK_VERSION }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install

      - name: Configure Gradle (2 ABIs + caching + parallel)
        run: |
          cd android
          if grep -q '^reactNativeArchitectures=' gradle.properties; then
            sed -i 's/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a,armeabi-v7a/' gradle.properties
          else
            echo 'reactNativeArchitectures=arm64-v8a,armeabi-v7a' >> gradle.properties
          fi
          {
            echo 'org.gradle.caching=true'
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.configureondemand=true'
          } >> gradle.properties

      - name: Ensure required NDK
        run: |
          VER=$(grep -rhoE 'ndkVersion[^0-9]*[0-9][0-9.]+' android/build.gradle android/app/build.gradle 2>/dev/null | grep -oE '[0-9][0-9.]+' | head -1)
          VER=${VER:-$NDK_VERSION}
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          if [ -d "$ANDROID_HOME/ndk/$VER" ]; then echo "ndk $VER already present"; exit 0; fi
          for i in 1 2 3; do
            echo "installing ndk;$VER (attempt $i)"
            if "$SDKMGR" "ndk;$VER" "cmake;3.22.1" </dev/null; then echo "ndk install ok"; exit 0; fi
            echo "transient failure, retrying in 5s..."; sleep 5
          done
          echo "NDK install failed after 3 attempts"; exit 1

      - name: Gradle assembleRelease
        run: cd android && ./gradlew assembleRelease --no-daemon --build-cache -x lint

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload APK to S3
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "uploading $APK ($(du -h "$APK" | cut -f1))"
          aws s3 cp "$APK" "$S3_KEY" --content-type application/vnd.android.package-archive
          echo "done -> $S3_KEY"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vintract-mobile-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
